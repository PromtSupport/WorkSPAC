<!DOCTYPE html>
<html lang="ru" class="h-full bg-black select-none">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PROMT Support</title>
  
  
  <script src="https://cdn.tailwindcss.com"></script>
  

  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Иконки Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google-шрифт Inter для идеального контраста -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- Стили премиального неонового свечения и мобильного сглаживания -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;
    }
    
    /* Лавандовое неоновое свечение в стиле предоставленного изображения */
    .glowing-neon-container {
      background-color: #050505;
      border: 1.5px solid rgba(216, 180, 254, 0.4);
      box-shadow: 0 0 15px rgba(216, 180, 254, 0.15), inset 0 0 10px rgba(216, 180, 254, 0.03);
      border-radius: 12px;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    .glowing-neon-container:hover {
      border-color: rgba(216, 180, 254, 0.7);
      box-shadow: 0 0 25px rgba(216, 180, 254, 0.3), inset 0 0 15px rgba(216, 180, 254, 0.06);
    }

    .glowing-neon-input {
      background-color: #000000;
      border: 1px solid rgba(216, 180, 254, 0.2);
      transition: all 0.3s ease;
    }

    .glowing-neon-input:focus {
      border-color: rgba(216, 180, 254, 0.6);
      box-shadow: 0 0 12px rgba(216, 180, 254, 0.25);
    }

    /* Скрытие стандартного скроллбара для чистоты дизайна */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
      height: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #030303;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: rgba(216, 180, 254, 0.3);
      border-radius: 2px;
    }
  </style>
</head>
<body class="h-full overflow-hidden text-stone-200">

  <!-- Контейнер для рендеринга React -->
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Пользовательские аккаунты
    const USERS = {
      asya: { name: 'Asya', pass: 'Qaswer', avatar: 'A', role: 'Дизайн Технологии' },
      sasha: { name: 'Sasha', pass: 'p1tln', avatar: 'S', role: 'Дизайн Менеджмент' }
    };

    const INITIAL_FOLDERS = [];
    const INITIAL_TASKS = [];
    const INITIAL_CREDENTIALS = [];
    const INITIAL_EVENTS = [];

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [loginForm, setLoginForm] = useState({ username: '', password: '' });
      const [loginError, setLoginError] = useState('');
      const [activeTab, setActiveTab] = useState('storage');
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      const [terminalLogs, setTerminalLogs] = useState([
        { id: 1, time: '07 02 51', text: 'Система PROMT Support успешно запущен' },
        { id: 2, time: '07 02 52', text: 'Все контуры безопасности активны и изолированы' }
      ]);

      const [folders, setFolders] = useState(() => {
        const local = localStorage.getItem('promt_folders_v3');
        return local ? JSON.parse(local) : INITIAL_FOLDERS;
      });
      const [tasks, setTasks] = useState(() => {
        const local = localStorage.getItem('promt_tasks_v3');
        return local ? JSON.parse(local) : INITIAL_TASKS;
      });
      const [credentials, setCredentials] = useState(() => {
        const local = localStorage.getItem('promt_credentials_v3');
        return local ? JSON.parse(local) : INITIAL_CREDENTIALS;
      });
      const [events, setEvents] = useState(() => {
        const local = localStorage.getItem('promt_events_v3');
        return local ? JSON.parse(local) : INITIAL_EVENTS;
      });

      const [gscSiteUrl, setGscSiteUrl] = useState(() => localStorage.getItem('promt_gsc_site_url_v3') || '');
      const [gscToken, setGscToken] = useState(() => localStorage.getItem('promt_gsc_token_v3') || '');
      const [gscLoading, setGscLoading] = useState(false);
      const [showInstruction, setShowInstruction] = useState(false);
      
      const [gscMetrics, setGscMetrics] = useState(() => {
        const local = localStorage.getItem('promt_gsc_metrics_v3');
        return local ? JSON.parse(local) : {
          totalClicks: 0,
          totalImpressions: 0,
          avgCtr: 0,
          avgPosition: 0,
          queries: [],
          chartData: []
        };
      });

      const [selectedFolder, setSelectedFolder] = useState('');
      const [newFolderName, setNewFolderName] = useState('');
      const [newFileName, setNewFileName] = useState('');
      const [newTask, setNewTask] = useState({ title: '', status: 'Planned', priority: 'Средний', assignee: 'Asya', deadline: '', desc: '' });
      const [newCred, setNewCred] = useState({ title: '', category: 'Ключи API', login: '', secret: '', link: '' });
      
      const [newEventTitle, setNewEventTitle] = useState('');
      const [newEventTime, setNewEventTime] = useState('');

      const [showSecretId, setShowSecretId] = useState({});
      const [copiedId, setCopiedId] = useState(null);
      const [systemAlert, setSystemAlert] = useState(null);
      const [selectedCalendarDay, setSelectedCalendarDay] = useState(23); 

      // Сохранение в локальное хранилище браузера
      useEffect(() => {
        localStorage.setItem('promt_folders_v3', JSON.stringify(folders));
      }, [folders]);

      useEffect(() => {
        localStorage.setItem('promt_tasks_v3', JSON.stringify(tasks));
      }, [tasks]);

      useEffect(() => {
        localStorage.setItem('promt_credentials_v3', JSON.stringify(credentials));
      }, [credentials]);

      useEffect(() => {
        localStorage.setItem('promt_events_v3', JSON.stringify(events));
      }, [events]);

      useEffect(() => {
        localStorage.setItem('promt_gsc_site_url_v3', gscSiteUrl);
      }, [gscSiteUrl]);

      useEffect(() => {
        localStorage.setItem('promt_gsc_token_v3', gscToken);
      }, [gscToken]);

      useEffect(() => {
        localStorage.setItem('promt_gsc_metrics_v3', JSON.stringify(gscMetrics));
      }, [gscMetrics]);

      useEffect(() => {
        if (folders.length > 0 && !selectedFolder) {
          setSelectedFolder(folders[0].id);
        }
      }, [folders, selectedFolder]);

      const logEvent = (text) => {
        const now = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        const timeStr = `${pad(now.getHours())} ${pad(now.getMinutes())} ${pad(now.getSeconds())}`;
        setTerminalLogs(prev => [
          { id: Date.now(), time: timeStr, text },
          ...prev.slice(0, 15)
        ]);
      };

      const triggerAlert = (message) => {
        setSystemAlert(message);
        setTimeout(() => {
          setSystemAlert(null);
        }, 4000);
      };

      // Импорт данных из реальной консоли Google
      const handleFetchGscData = async (e) => {
        if (e) e.preventDefault();
        if (!gscSiteUrl.trim() || !gscToken.trim()) {
          triggerAlert('Укажите адрес сайта и рабочий токен доступа');
          return;
        }
        
        setGscLoading(true);
        logEvent('Инициирован запрос к программному интерфейсу Гугл Консоли');

        try {
          const cleanSiteUrl = gscSiteUrl.trim();
          const encodedSite = encodeURIComponent(cleanSiteUrl);
          const queryUrl = `https://www.googleapis.com/webmasters/v3/sites/${encodedSite}/searchAnalytics/query`;

          const responseQueries = await fetch(queryUrl, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${gscToken.trim()}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              startDate: '2026-05-01',
              endDate: '2026-05-23',
              dimensions: ['query'],
              rowLimit: 10
            })
          });

          if (!responseQueries.ok) {
            throw new Error('Ошибка получения списка поисковых фраз с сервера');
          }

          const dataQueries = await responseQueries.json();

          const responseDates = await fetch(queryUrl, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${gscToken.trim()}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              startDate: '2026-05-01',
              endDate: '2026-05-23',
              dimensions: ['date']
            })
          });

          if (!responseDates.ok) {
            throw new Error('Ошибка получения данных аналитического графика');
          }

          const dataDates = await responseDates.json();

          const queryRows = dataQueries.rows || [];
          const dateRows = dataDates.rows || [];

          let totalClicks = 0;
          let totalImpressions = 0;
          let sumCtr = 0;
          let sumPosition = 0;

          dateRows.forEach(row => {
            totalClicks += row.clicks || 0;
            totalImpressions += row.impressions || 0;
            sumCtr += row.ctr || 0;
            sumPosition += row.position || 0;
          });

          const avgCtrValue = dateRows.length ? Math.round((sumCtr / dateRows.length) * 100) : 0;
          const avgPosValue = dateRows.length ? Math.round(sumPosition / dateRows.length) : 0;

          const processedQueries = queryRows.map(row => ({
            query: row.keys?.[0] || 'Неизвестный запрос',
            clicks: row.clicks || 0,
            ctr: Math.round((row.ctr || 0) * 100),
            position: Math.round(row.position || 0)
          }));

          const processedChart = dateRows.map(row => ({
            date: row.keys?.[0] || '',
            clicks: row.clicks || 0
          })).sort((a, b) => a.date.localeCompare(b.date));

          setGscMetrics({
            totalClicks,
            totalImpressions,
            avgCtr: avgCtrValue,
            avgPosition: avgPosValue,
            queries: processedQueries,
            chartData: processedChart
          });

          triggerAlert('Данные Гугл Консоли успешно обновлены');
          logEvent('Импортированы подлинные данные из Гугл Консоли');

        } catch (err) {
          console.error(err);
          triggerAlert('Ошибка импорта проверьте правильность введенного токена и адреса ресурса');
          logEvent('Сбой прямого импорта данных из Гугл Консоли');
        } finally {
          setGscLoading(false);
        }
      };

      const handleLogin = (e) => {
        e.preventDefault();
        const user = USERS[loginForm.username.toLowerCase()];
        if (user && user.pass === loginForm.password) {
          setCurrentUser(user);
          setLoginForm({ username: '', password: '' });
          setLoginError('');
          logEvent(`Оператор ${user.name} успешно вошел в систему`);
          triggerAlert('Защищенное соединение успешно установлено');
        } else {
          setLoginError('Ошибка доступа неверный ключ оператора или пароль доступа');
          logEvent('Неудачная попытка входа в закрытую систему');
        }
      };

      const handleLogout = () => {
        logEvent(`Оператор ${currentUser.name} вышел из системы`);
        setCurrentUser(null);
        setMobileMenuOpen(false);
        triggerAlert('Сеанс связи успешно завершен');
      };

      const handleAddFolder = (e) => {
        e.preventDefault();
        if (!newFolderName.trim()) return;
        const newF = {
          id: 'f_' + Date.now(),
          name: newFolderName.trim(),
          files: []
        };
        setFolders(prev => [...prev, newF]);
        setSelectedFolder(newF.id);
        logEvent(`Создана папка архива ${newFolderName}`);
        triggerAlert('Новая папка архива создана успешно');
        setNewFolderName('');
      };

      const handleAddFile = (e) => {
        e.preventDefault();
        if (!newFileName.trim() || !selectedFolder) return;
        
        setFolders(prev => prev.map(f => {
          if (f.id === selectedFolder) {
            return {
              ...f,
              files: [
                ...f.files,
                {
                  id: 'file_' + Date.now(),
                  name: newFileName.trim(),
                  size: '1 мегабайт',
                  date: '23 мая 2026',
                  category: 'Архив документов'
                }
              ]
            };
          }
          return f;
        }));
        logEvent(`Добавлен файл ${newFileName}`);
        triggerAlert('Файл успешно сохранен в хранилище');
        setNewFileName('');
      };

      const handleDeleteFile = (folderId, fileId, fileName) => {
        setFolders(prev => prev.map(f => {
          if (f.id === folderId) {
            return {
              ...f,
              files: f.files.filter(file => file.id !== fileId)
            };
          }
          return f;
        }));
        logEvent(`Удален файл ${fileName}`);
        triggerAlert('Файл удален из системы');
      };

      const handleAddTask = (e) => {
        e.preventDefault();
        if (!newTask.title.trim()) return;
        const taskToAdd = {
          ...newTask,
          id: 'task_' + Date.now(),
          deadline: newTask.deadline || '2026-05-23'
        };
        setTasks(prev => [...prev, taskToAdd]);
        logEvent(`Зарегистрирована рабочая задача ${newTask.title}`);
        triggerAlert('Новая задача успешно добавлена');
        setNewTask({ title: '', status: 'Planned', priority: 'Средний', assignee: 'Asya', deadline: '', desc: '' });
      };

      const updateTaskStatus = (id, nextStatus) => {
        setTasks(prev => prev.map(t => {
          if (t.id === id) {
            logEvent(`Статус задачи изменен на ${nextStatus}`);
            return { ...t, status: nextStatus };
          }
          return t;
        }));
      };

      const deleteTask = (id, title) => {
        setTasks(prev => prev.filter(t => t.id !== id));
        logEvent(`Удалена задача ${title}`);
        triggerAlert('Рабочая задача полностью исключена из реестра');
      };

      const handleAddEvent = (e) => {
        e.preventDefault();
        if (!newEventTitle.trim()) return;
        const formattedDayStr = `2026-05-${selectedCalendarDay.toString().padStart(2, '0')}`;
        const eventToAdd = {
          id: 'event_' + Date.now(),
          title: newEventTitle.trim(),
          time: newEventTime.trim() || '00 00',
          date: formattedDayStr
        };
        setEvents(prev => [...prev, eventToAdd]);
        logEvent(`Зарегистрировано новое событие ${newEventTitle.trim()} на ${selectedCalendarDay} мая`);
        triggerAlert('Событие успешно добавлено в календарный план');
        setNewEventTitle('');
        setNewEventTime('');
      };

      const deleteEvent = (id, title) => {
        setEvents(prev => prev.filter(ev => ev.id !== id));
        logEvent(`Уничтожено событие ${title}`);
        triggerAlert('Событие полностью исключено из плана');
      };

      const handleAddCredential = (e) => {
        e.preventDefault();
        if (!newCred.title.trim() || !newCred.secret.trim()) return;
        const credToAdd = {
          ...newCred,
          id: 'cred_' + Date.now(),
          link: newCred.link.trim() || '#'
        };
        setCredentials(prev => [...prev, credToAdd]);
        logEvent(`Зашифрованы новые параметры доступа для ${newCred.title}`);
        triggerAlert('Параметры доступа успешно сохранены в сейфе');
        setNewCred({ title: '', category: 'Ключи API', login: '', secret: '', link: '' });
      };

      const toggleSecret = (id) => {
        setShowSecretId(prev => ({ ...prev, [id]: !prev[id] }));
      };

      const copyToClipboard = (text, id) => {
        const el = document.createElement('textarea');
        el.value = text;
        document.body.appendChild(el);
        el.select();
        document.execCommand('copy');
        document.body.removeChild(el);
        setCopiedId(id);
        triggerAlert('Данные успешно скопированы');
        setTimeout(() => {
          setCopiedId(null);
        }, 2000);
      };

      const deleteCredential = (id, title) => {
        setCredentials(prev => prev.filter(c => c.id !== id));
        logEvent(`Уничтожен секретный ключ для ${title}`);
        triggerAlert('Параметры доступа полностью удалены из сейфа');
      };

      const activeMonthDays = 31; 
      const startDayOffset = 5; 
      
      const getTasksForDay = (day) => {
        const formattedDayStr = `2026-05-${day.toString().padStart(2, '0')}`;
        return tasks.filter(t => t.deadline === formattedDayStr);
      };

      const getEventsForDay = (day) => {
        const formattedDayStr = `2026-05-${day.toString().padStart(2, '0')}`;
        return events.filter(ev => ev.date === formattedDayStr);
      };

      const buildSvgPath = () => {
        if (!gscMetrics.chartData || gscMetrics.chartData.length === 0) return '';
        const maxClicks = Math.max(...gscMetrics.chartData.map(d => d.clicks), 1);
        return gscMetrics.chartData.map((d, index) => {
          const x = 50 + (index / Math.max(gscMetrics.chartData.length - 1, 1)) * 600;
          const y = 210 - (d.clicks / maxClicks) * 140;
          return `${index === 0 ? 'M' : 'L'} ${x} ${y}`;
        }).join(' ');
      };

      const buildSvgAreaPath = () => {
        if (!gscMetrics.chartData || gscMetrics.chartData.length === 0) return '';
        const maxClicks = Math.max(...gscMetrics.chartData.map(d => d.clicks), 1);
        let path = gscMetrics.chartData.map((d, index) => {
          const x = 50 + (index / Math.max(gscMetrics.chartData.length - 1, 1)) * 600;
          const y = 210 - (d.clicks / maxClicks) * 140;
          return `${index === 0 ? 'M' : 'L'} ${x} ${y}`;
        }).join(' ');
        const lastX = 50 + 600;
        path += ` L ${lastX} 210 L 50 210 Z`;
        return path;
      };

      return (
        <div className="flex flex-col h-full overflow-hidden bg-[#020202] text-stone-100 relative selection:bg-purple-950 selection:text-purple-200 antialiased">
          
          {/* Декоративные темные градиенты и сетка */}
          <div className="absolute inset-0 bg-[radial-gradient(circle_at_top_right,_rgba(216,180,254,0.07),_transparent_45%)] pointer-events-none z-0"></div>
          <div className="absolute inset-0 bg-[linear-gradient(rgba(18,16,16,0)_50%,_rgba(0,0,0,0.4)_50%)] bg-[length:100%_4px] pointer-events-none z-0"></div>

          {/* Верхний сервисный статус-бар */}
          <div className="w-full bg-[#050505] border-b border-stone-900 py-1.5 px-4 text-[9px] tracking-[0.2em] font-mono text-stone-500 flex justify-between items-center z-20">
            <div className="flex items-center gap-2">
              <span className="w-1.5 h-1.5 rounded-full bg-purple-400 animate-pulse"></span>
              <span className="truncate">Защищенный канал связи Статус Зашифровано</span>
            </div>
            <div className="hidden sm:block">
              <span>Локация Облачный Узел 099 Время МСК</span>
            </div>
          </div>

          {/* Всплывающее уведомление системы */}
          {systemAlert && (
            <div className="fixed bottom-4 right-4 left-4 sm:left-auto sm:w-80 z-50 animate-fadeIn pointer-events-none">
              <div className="bg-[#070707] border-l-2 border-purple-400 border-y border-r border-stone-900 text-xs px-4 py-3.5 shadow-2xl flex items-center gap-3.5 rounded-r-md">
                <div className="p-1.5 rounded bg-black text-purple-300">
                  <i data-lucide="terminal" class="w-4 h-4"></i>
                </div>
                <div>
                  <p className="font-mono text-[9px] uppercase text-stone-500 font-bold">Оповещение системы</p>
                  <p className="text-stone-300 tracking-wide mt-0.5">{systemAlert}</p>
                </div>
              </div>
            </div>
          )}

          {}
          {!currentUser ? (
            <div className="flex-1 flex flex-col justify-center items-center px-4 relative z-10 py-8 overflow-y-auto">
              
              <div className="max-w-md w-full relative">
                <div className="text-center mb-6">
                  <div className="mx-auto w-14 h-14 rounded-xl border border-purple-900/60 flex items-center justify-center bg-[#050505] mb-3.5 shadow-[0_0_20px_rgba(216,180,254,0.15)] relative">
                    <span className="font-serif text-2xl font-bold tracking-widest text-purple-300">P</span>
                  </div>
                  <h1 className="text-2xl font-serif tracking-[0.25em] font-light text-stone-100 uppercase">PROMT Support</h1>
                  <p className="text-[9px] font-mono uppercase tracking-[0.3em] text-stone-500 mt-1.5">Приватное совместное пространство</p>
                </div>

                <div className="glowing-neon-container p-6 relative overflow-hidden">
                  <div className="mb-5">
                    <h2 className="text-xs uppercase font-mono tracking-[0.2em] text-stone-400">Вход в систему</h2>
                    <p className="text-[10px] text-stone-500 mt-1">Доступ разрешен только для подтвержденных операторов системы</p>
                  </div>

                  {loginError && (
                    <div className="bg-purple-950/20 border border-purple-900/30 text-[10px] font-mono text-purple-300 p-3 rounded mb-5 flex items-start gap-2">
                      <span className="text-purple-400 mt-0.5">⚠️</span>
                      <span>{loginError}</span>
                    </div>
                  )}

                  <form onSubmit={handleLogin} className="space-y-4">
                    <div>
                      <label className="block text-[9px] font-mono uppercase tracking-widest text-stone-400 mb-1.5">Ключ оператора</label>
                      <input 
                        type="text"
                        className="w-full glowing-neon-input rounded text-xs px-3.5 py-3 text-stone-200 font-mono transition-colors outline-none focus:ring-0"
                        value={loginForm.username}
                        onChange={(e) => setLoginForm({...loginForm, username: e.target.value})}
                        required
                        autoComplete="off"
                      />
                    </div>

                    <div>
                      <label className="block text-[9px] font-mono uppercase tracking-widest text-stone-400 mb-1.5">Пароль</label>
                      <input 
                        type="password"
                        className="w-full glowing-neon-input rounded text-xs px-3.5 py-3 text-stone-200 font-mono transition-colors outline-none focus:ring-0"
                        value={loginForm.password}
                        onChange={(e) => setLoginForm({...loginForm, password: e.target.value})}
                        required
                      />
                    </div>

                    <button 
                      type="submit"
                      className="w-full bg-stone-100 hover:bg-stone-200 text-black py-3 rounded text-xs font-mono uppercase tracking-[0.15em] transition-all font-bold flex items-center justify-center gap-2 mt-2"
                    >

                      <div className="space-y-2 max-w-2xl mb-4">
                        <span className="bg-purple-950/40 border border-purple-900/50 text-purple-300 px-2 py-0.5 rounded text-[9px] font-mono uppercase self-start">API модуль</span>
                        <h3 className="text-lg font-serif text-stone-100 font-bold tracking-wide">Google Search Console</h3>
                        <p className="text-[10px] text-stone-400 leading-relaxed font-mono">
                          Наш сайт функционирует на основе органического поискового трафика Ниже представлена аналитика эффективности ресурса Для интеграции необходимо указать токен доступа и URL
                        </p>
                      </div>

                      <button 
                        onClick={() => setShowInstruction(!showInstruction)}
                        className="bg-black hover:bg-[#101010] border border-stone-900 text-stone-300 px-3.5 py-2.5 rounded text-[9px] font-mono flex items-center gap-1.5 transition-colors uppercase"
                      >
                        <span>Инструкция подключения</span>
                      </button>

                      {showInstruction && (
                        <div className="mt-3 bg-black border border-purple-900/30 p-4 rounded font-mono text-[9px] text-stone-400 space-y-2 leading-relaxed">
                          <p className="text-purple-300 uppercase tracking-wider font-bold">Последовательность интеграции Google Console API</p>
                          <p>Шаг 1 Перейдите на официальный портал Google OAuth Playground</p>
                          <p>Шаг 2 Найдите Search Console API v3 и выберите права доступа</p>
                          <p>Шаг 3 Авторизуйтесь и сгенерируйте токен авторизации OAuth2</p>
                          <p>Шаг 4 Скопируйте токен в поле ввода укажите точное название домена и нажмите импортировать</p>
                        </div>
                      )}

                      <form onSubmit={handleFetchGscData} className="mt-4 grid grid-cols-1 sm:grid-cols-3 gap-3">
                        <div>
                          <label className="block text-[8px] font-mono uppercase tracking-wider text-stone-400 mb-1.5">Адрес сайта в системе</label>
                          <input 
                            type="text"
                            className="w-full glowing-neon-input text-xs p-2.5 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                            placeholder="sc domain domain com"
                            value={gscSiteUrl}
                            onChange={(e) => setGscSiteUrl(e.target.value)}
                            required
                          />
                        </div>
                        <div>
                          <label className="block text-[8px] font-mono uppercase tracking-wider text-stone-400 mb-1.5">Токен доступа OAuth2</label>
                          <input 
                            type="password"
                            className="w-full glowing-neon-input text-xs p-2.5 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                            placeholder="Вставьте токен доступа"
                            value={gscToken}
                            onChange={(e) => setGscToken(e.target.value)}
                            required
                          />
                        </div>
                        <div className="flex items-end">
                          <button 
                            type="submit" 
                            disabled={gscLoading}
                            className="w-full bg-stone-100 hover:bg-white text-black rounded text-[10px] font-mono uppercase font-bold tracking-widest transition-colors flex items-center justify-center gap-2 py-3 disabled:opacity-50"
                          >
                            <span>Импортировать данные</span>
                          </button>
                        </div>
                      </form>
                    </div>

                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                      {[
                        { label: 'Переходы из поиска', value: gscMetrics.totalClicks ? gscMetrics.totalClicks.toLocaleString() : '0' },
                        { label: 'Общие показы', value: gscMetrics.totalImpressions ? gscMetrics.totalImpressions.toLocaleString() : '0' },
                        { label: 'Показатель CTR', value: gscMetrics.avgCtr ? `${gscMetrics.avgCtr} процентов` : '0 процентов' },
                        { label: 'Средняя позиция', value: gscMetrics.avgPosition ? gscMetrics.avgPosition : '0' }
                      ].map((stat, idx) => (
                        <div key={idx} className="glowing-neon-container p-4">
                          <span className="text-[9px] font-mono text-stone-500 uppercase tracking-widest block">{stat.label}</span>
                          <span className="text-lg sm:text-xl font-serif font-bold text-stone-100 block mt-1">{stat.value}</span>
                        </div>
                      ))}
                    </div>

                    <div className="glowing-neon-container p-4">
                      <div className="border-b border-stone-900 pb-3 mb-3">
                        <span className="text-[9px] font-mono uppercase tracking-widest text-stone-400">График кликов в поисковой выдаче за неделю</span>
                      </div>

                      <div className="w-full h-44 relative">
                        {gscMetrics.chartData && gscMetrics.chartData.length > 0 ? (
                          <svg className="w-full h-full" viewBox="0 0 700 250" preserveAspectRatio="none">
                            <defs>
                              <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#d8b4fe" stopOpacity="0.25" />
                                <stop offset="100%" stopColor="#d8b4fe" stopOpacity="0.00" />
                              </linearGradient>
                            </defs>
                            <line x1="0" y1="50" x2="700" y2="50" stroke="#111" strokeWidth="1" />
                            <line x1="0" y1="150" x2="700" y2="150" stroke="#111" strokeWidth="1" />
                            <path d={buildSvgAreaPath()} fill="url(#chartGradient)" />
                            <path d={buildSvgPath()} fill="none" stroke="#d8b4fe" strokeWidth="2.5" />
                          </svg>
                        ) : (
                          <div className="absolute inset-0 flex items-center justify-center border border-dashed border-stone-900 rounded">
                            <span className="font-mono text-[9px] text-stone-600 uppercase tracking-widest text-center px-4">
                              Укажите параметры доступа выше для построения графика
                            </span>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {}
                {activeTab === 'safe' && (
                  <div className="space-y-5">
                    <div className="glowing-neon-container p-4">
                      <span className="text-[9px] font-mono uppercase tracking-widest text-stone-500 mb-3 block">Записать новые доступы</span>
                      <form onSubmit={handleAddCredential} className="grid grid-cols-1 sm:grid-cols-4 gap-3">
                        <input 
                          type="text"
                          className="glowing-neon-input text-xs p-3 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                          placeholder="Название доступа"
                          value={newCred.title}
                          onChange={(e) => setNewCred({...newCred, title: e.target.value})}
                          required
                        />
                        <input 
                          type="text"
                          className="glowing-neon-input text-xs p-3 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                          placeholder="Логин"
                          value={newCred.login}
                          onChange={(e) => setNewCred({...newCred, login: e.target.value})}
                        />
                        <input 
                          type="password"
                          className="glowing-neon-input text-xs p-3 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                          placeholder="Секретный пароль"
                          value={newCred.secret}
                          onChange={(e) => setNewCred({...newCred, secret: e.target.value})}
                          required
                        />
                        <button type="submit" className="bg-stone-100 hover:bg-white text-black rounded text-xs font-mono uppercase font-bold tracking-widest transition-colors py-3">
                          <span>Запечатать</span>
                        </button>
                      </form>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      {credentials.length === 0 ? (
                        <div className="md:col-span-2 text-center py-12 border border-dashed border-stone-900 rounded-lg">
                          <p className="font-mono text-[9px] text-stone-600 uppercase tracking-widest">Сейф пуст</p>
                        </div>
                      ) : (
                        credentials.map(c => (
                          <div key={c.id} className="glowing-neon-container p-4 relative overflow-hidden flex flex-col justify-between">
                            <div className="space-y-3">
                              <div className="flex items-start justify-between">
                                <div>
                                  <span className="text-[8px] font-mono uppercase text-purple-400 tracking-widest">{c.category || 'Общие'}</span>
                                  <h4 className="text-xs font-mono font-bold text-stone-200 mt-0.5">{c.title}</h4>
                                </div>
                                <button 
                                  onClick={() => deleteCredential(c.id, c.title)}
                                  className="text-stone-500 hover:text-purple-400 p-1"
                                >
                                  <i data-lucide="trash-2" class="w-4 h-4"></i>
                                </button>
                              </div>

                              <div className="space-y-2 bg-black border border-stone-900 rounded p-3 font-mono text-[10px]">
                                <div className="flex justify-between items-center py-1">
                                  <div>
                                    <span className="text-[8px] text-stone-600 uppercase block">Логин</span>
                                    <span className="text-stone-300 break-all">{c.login || 'Идентификатор отсутствует'}</span>
                                  </div>
                                  {c.login && (
                                    <button 
                                      onClick={() => copyToClipboard(c.login, `${c.id}-login`)} 
                                      className="text-stone-500 hover:text-stone-300 p-1"
                                    >
                                      {copiedId === `${c.id}-login` ? '✅' : <i data-lucide="copy" class="w-3.5 h-3.5"></i>}
                                    </button>
                                  )}
                                </div>

                                <div className="flex justify-between items-center py-1 border-t border-stone-950">
                                  <div>
                                    <span className="text-[8px] text-stone-600 uppercase block">Шифр</span>
                                    <span className="text-stone-200 tracking-wider">
                                      {showSecretId[c.id] ? c.secret : '••••••••••••••••'}
                                    </span>
                                  </div>
                                  <div className="flex items-center gap-1.5">
                                    <button 
                                      onClick={() => toggleSecret(c.id)} 
                                      className="text-stone-500 hover:text-stone-300 p-1"
                                    >
                                      {showSecretId[c.id] ? <i data-lucide="eye-off" class="w-3.5 h-3.5"></i> : <i data-lucide="eye" class="w-3.5 h-3.5"></i>}
                                    </button>
                                    <button 
                                      onClick={() => copyToClipboard(c.secret, `${c.id}-secret`)} 
                                      className="text-stone-500 hover:text-stone-300 p-1"
                                    >
                                      {copiedId === `${c.id}-secret` ? '✅' : <i data-lucide="copy" class="w-3.5 h-3.5"></i>}
                                    </button>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}

              </main>
            </div>
          )}

          {/* Сервисный нижний футер */}
          <footer className="bg-[#020202] border-t border-stone-900 py-3 px-6 text-center text-[8px] font-mono text-stone-600 uppercase tracking-widest z-20">
            <span>2026 Система PROMT Support Безопасная сессия</span>
          </footer>

        </div>
      );
    }

    // Инициализация Lucide иконок после каждого рендера
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    
    function MainApp() {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
      return <App />;
    }

    root.render(<MainApp />);
  </script>
</body>
</html>
