<!DOCTYPE html>
<html lang="ru" class="h-full bg-black select-none">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>PROMT Support</title>
  
  <!-- Подключение Tailwind CSS для адаптивной верстки -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Подключение React и Babel для сборки на лету на GitHub Pages -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- Иконки Lucide -->
  <script src="https://unpkg.com/lucide@latest"></script>

  <!-- Google шрифт Inter для идеального контраста -->

  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <!-- Библиотека Yjs для распределенной синхронизации -->

  <!-- Провайдер WebRTC для моментальной связи браузеров -->
  <script src="https://cdn.jsdelivr.net/npm/y-webrtc@10.3.0/dist/y-webrtc.min.js"></script>

  <!-- Стили премиального неонового свечения и мобильного сглаживания -->
  <style>
    body {
      font-family: 'Inter', sans-serif;
      -webkit-tap-highlight-color: transparent;

</head>
<body class="h-full overflow-hidden text-stone-200">

  <!-- Контейнер для рендеринга React -->
  <div id="root" class="h-full"></div>

  <script type="text/babel">
    // Объявление безопасных локальных заглушек на случай если библиотеки Yjs еще не загрузились полностью
    const SafeY = window.Y || {
      Doc: class {
        constructor() {
          this.maps = new Map();
          this.arrays = new Map();
          this.texts = new Map();
        }
        getMap(name) {
          if (!this.maps.has(name)) {
            this.maps.set(name, {
              observe: () => {},
              set: (key, val) => { this.maps.get(name).data[key] = val; },
              get: (key) => this.maps.get(name).data[key],
              size: 0,
              toJSON: () => this.maps.get(name).data,
              data: {}
            });
          }
          return this.maps.get(name);
        }
        getArray(name) {
          if (!this.arrays.has(name)) {
            this.arrays.set(name, {
              observe: () => {},
              push: (items) => { this.arrays.get(name).data.push(...items); },
              toArray: () => this.arrays.get(name).data,
              delete: (index, len) => { this.arrays.get(name).data.splice(index, len); },
              insert: (index, items) => { this.arrays.get(name).data.splice(index, 0, ...items); },
              get length() { return this.arrays.get(name).data.length; },
              data: []
            });
          }
          return this.arrays.get(name);
        }
        getText(name) {
          if (!this.texts.has(name)) {
            this.texts.set(name, {
              observe: () => {},
              unobserve: () => {},
              toString: () => this.texts.get(name).data,
              delete: (index, len) => {
                const cur = this.texts.get(name).data;
                this.texts.get(name).data = cur.slice(0, index) + cur.slice(index + len);
              },
              insert: (index, str) => {
                const cur = this.texts.get(name).data;
                this.texts.get(name).data = cur.slice(0, index) + str + cur.slice(index);
              },
              data: ""
            });
          }
          return this.texts.get(name);
        }
        transact(fn) { fn(); }
        destroy() {}
      }
    };

    const SafeYWebrtc = window.YWebrtc || {
      WebrtcProvider: class {
        constructor() {}
        destroy() {}
      }
    };

    const { useState, useEffect, useRef } = React;

    // Авторизационные параметры для двух подтвержденных операторов
    const USERS = {
      asya: { name: 'Asya', pass: 'Qaswer', avatar: 'A', role: 'Дизайн Технологии' },
      sasha: { name: 'Sasha', pass: 'p1tln', avatar: 'S', role: 'Дизайн Менеджмент' }
    };

    function App() {
      const [currentUser, setCurrentUser] = useState(null);
      const [loginForm, setLoginForm] = useState({ username: '', password: '' });
      const [loginError, setLoginError] = useState('');
      const [activeTab, setActiveTab] = useState('storage');
      const [mobileMenuOpen, setMobileMenuOpen] = useState(false);
      
      const [terminalLogs, setTerminalLogs] = useState([
        { id: 1, time: '07 02 51', text: 'Система PROMT Support успешно запущен' },
        { id: 2, time: '07 02 52', text: 'Все контуры безопасности активны и изолированы' }
      ]);

      // Локальные реактивные состояния, которые синхронизируются через Yjs
      const [folders, setFolders] = useState([]);
      const [tasks, setTasks] = useState([]);
      const [credentials, setCredentials] = useState([]);
      const [events, setEvents] = useState([]);

      // Ссылка на общий документ Yjs и провайдер WebRTC
      const ydocRef = useRef(null);
      const providerRef = useRef(null);

      // Состояния для работы с Google Search Console
      const [gscSiteUrl, setGscSiteUrl] = useState(() => localStorage.getItem('promt_gsc_site_url_v3') || '');
      const [gscToken, setGscToken] = useState(() => localStorage.getItem('promt_gsc_token_v3') || '');
      const [gscLoading, setGscLoading] = useState(false);
      const [showInstruction, setShowInstruction] = useState(false);
      
      const [gscMetrics, setGscMetrics] = useState(() => {
        const local = localStorage.getItem('promt_gsc_metrics_v3');
        return local ? JSON.parse(local) : {
          totalClicks: 0,
          totalImpressions: 0,
          avgCtr: 0,
          avgPosition: 0,
          queries: [],
          chartData: []
        };
      });

      // Переменные для добавления новых данных
      const [selectedFolder, setSelectedFolder] = useState('');
      const [newFolderName, setNewFolderName] = useState('');
      const [newFileName, setNewFileName] = useState('');
      const [newTask, setNewTask] = useState({ title: '', status: 'Planned', priority: 'Средний', assignee: 'Asya', deadline: '', desc: '' });
      const [newCred, setNewCred] = useState({ title: '', category: 'Ключи API', login: '', secret: '', link: '' });
      const [newEventTitle, setNewEventTitle] = useState('');
      const [newEventTime, setNewEventTime] = useState('');

      // Перетаскивание файлов
      const [isDragging, setIsDragging] = useState(false);
      const fileInputRef = useRef(null);

      // Совместный текстовый редактор в реальном времени
      const [activeEditingFile, setActiveEditingFile] = useState(null);
      const [collaborativeText, setCollaborativeText] = useState('');
      const ytextObserverRef = useRef(null);

      const [showSecretId, setShowSecretId] = useState({});
      const [copiedId, setCopiedId] = useState(null);
      const [systemAlert, setSystemAlert] = useState(null);
      const [selectedCalendarDay, setSelectedCalendarDay] = useState(23); 

      // Настройка и запуск P2P-синхронизации Yjs на клиенте
      useEffect(() => {
        // Создаем новый документ Yjs с учетом безопасных заглушек
        const ydoc = new SafeY.Doc();
        ydocRef.current = ydoc;

        // Подключаем WebRTC-провайдер с безопасным публичным сигнальным сервером
        // Имя комнаты шифруется для приватности двух участников
        const roomName = 'promt-support-secure-p2p-v3-channel';
        const provider = new SafeYWebrtc.WebrtcProvider(roomName, ydoc, {
          signaling: ['wss://signaling.yjs.dev']
        });
        providerRef.current = provider;

        // Создаем общие структуры данных Yjs
        const sharedFolders = ydoc.getMap('folders');
        const sharedTasks = ydoc.getArray('tasks');
        const sharedEvents = ydoc.getArray('events');
        const sharedCredentials = ydoc.getArray('credentials');

        // Подписка на изменение папок и файлов
        sharedFolders.observe(() => {
          const rawFolders = sharedFolders.toJSON();
          const parsedFolders = Object.keys(rawFolders).map(key => rawFolders[key]);
          setFolders(parsedFolders);
          if (parsedFolders.length > 0 && !selectedFolder) {
            setSelectedFolder(parsedFolders[0].id);
          }
        });

        // Подписка на изменение задач
        sharedTasks.observe(() => {
          setTasks(sharedTasks.toArray());
        });

        // Подписка на изменение календаря событий
        sharedEvents.observe(() => {
          setEvents(sharedEvents.toArray());
        });

        // Подписка на изменение паролей сейфа
        sharedCredentials.observe(() => {
          setCredentials(sharedCredentials.toArray());
        });

        // Загружаем резервные данные из локального хранилища при первом старте, если они там есть
        const localFolders = localStorage.getItem('promt_folders_v3');
        if (localFolders && sharedFolders.size === 0) {
          const parsed = JSON.parse(localFolders);
          parsed.forEach(f => sharedFolders.set(f.id, f));
        }

        const localTasks = localStorage.getItem('promt_tasks_v3');
        if (localTasks && sharedTasks.length === 0) {
          sharedTasks.push(JSON.parse(localTasks));
        }

        const localEvents = localStorage.getItem('promt_events_v3');
        if (localEvents && sharedEvents.length === 0) {
          sharedEvents.push(JSON.parse(localEvents));
        }

        const localCredentials = localStorage.getItem('promt_credentials_v3');
        if (localCredentials && sharedCredentials.length === 0) {
          sharedCredentials.push(JSON.parse(localCredentials));
        }

        logEvent('Служба P2P синхронизации успешно запущена');

        return () => {
          provider.destroy();
          ydoc.destroy();
        };
      }, []);

      // Синхронное резервное сохранение изменений в localStorage браузера
      useEffect(() => {
        if (folders.length > 0) {
          localStorage.setItem('promt_folders_v3', JSON.stringify(folders));
        }
      }, [folders]);

      useEffect(() => {
        if (tasks.length > 0) {
          localStorage.setItem('promt_tasks_v3', JSON.stringify(tasks));
        }
      }, [tasks]);

      useEffect(() => {
        if (credentials.length > 0) {
          localStorage.setItem('promt_credentials_v3', JSON.stringify(credentials));
        }
      }, [credentials]);

      useEffect(() => {
        if (events.length > 0) {
          localStorage.setItem('promt_events_v3', JSON.stringify(events));
        }
      }, [events]);

      useEffect(() => {
        localStorage.setItem('promt_gsc_site_url_v3', gscSiteUrl);
      }, [gscSiteUrl]);

      useEffect(() => {
        localStorage.setItem('promt_gsc_token_v3', gscToken);
      }, [gscToken]);

      useEffect(() => {
        localStorage.setItem('promt_gsc_metrics_v3', JSON.stringify(gscMetrics));
      }, [gscMetrics]);

      // Инициализация обработчика совместного редактирования выбранного файла
      useEffect(() => {
        if (!activeEditingFile || !ydocRef.current) return;

        // Создаем общую текстовую переменную в Yjs по идентификатору файла
        const ytext = ydocRef.current.getText(`file_content_${activeEditingFile.id}`);
        
        // Устанавливаем текущий текст из Yjs
        setCollaborativeText(ytext.toString());

        // Наблюдатель изменений от второго участника
        const observer = (event) => {
          setCollaborativeText(ytext.toString());
        };

        ytext.observe(observer);
        ytextObserverRef.current = { ytext, observer };

        return () => {
          if (ytextObserverRef.current) {
            ytextObserverRef.current.ytext.unobserve(ytextObserverRef.current.observer);
            ytextObserverRef.current = null;
          }
        };
      }, [activeEditingFile]);

      const logEvent = (text) => {
        const now = new Date();
        const pad = (n) => n.toString().padStart(2, '0');
        const timeStr = `${pad(now.getHours())} ${pad(now.getMinutes())} ${pad(now.getSeconds())}`;
        setTerminalLogs(prev => [
          { id: Date.now(), time: timeStr, text },
          ...prev.slice(0, 15)
        ]);
      };

      const triggerAlert = (message) => {
        setSystemAlert(message);
        setTimeout(() => {
          setSystemAlert(null);
        }, 4000);
      };

      // Обработка перетаскивания реальных файлов и целых папок
      const handleDragOver = (e) => {
        e.preventDefault();
        setIsDragging(true);
      };

      const handleDragLeave = () => {
        setIsDragging(false);
      };

      // Рекурсивный обход структуры папок при Drag & Drop
      const traverseFileEntry = async (entry, path = '') => {
        return new Promise((resolve) => {
          if (entry.isFile) {
            entry.file((file) => {
              const reader = new FileReader();
              reader.onload = (e) => {
                resolve([{
                  id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
                  name: file.name,
                  size: (file.size / 1024).toFixed(1) + ' килобайт',
                  date: '23 мая 2026',
                  category: 'Загруженный документ',
                  path: path,
                  content: e.target.result // Текст или Base64
                }]);
              };
              // Считываем текстовые файлы как текст для удобства совместного редактирования
              if (file.type.startsWith('text/') || file.name.endsWith('.txt') || file.name.endsWith('.md') || file.name.endsWith('.json') || file.name.endsWith('.js') || file.name.endsWith('.css')) {
                reader.readAsText(file);
              } else {
                reader.readAsDataURL(file); // Бинарные файлы считываем как base64 url
              }
            });
          } else if (entry.isDirectory) {
            const dirReader = entry.createReader();
            dirReader.readEntries(async (entries) => {
              const results = [];
              for (const childEntry of entries) {
                const subFiles = await traverseFileEntry(childEntry, path ? `${path}/${entry.name}` : entry.name);
                results.push(...subFiles);
              }
              resolve(results);
            });
          }
        });
      };

      const handleDrop = async (e) => {
        e.preventDefault();
        setIsDragging(false);
        const items = e.dataTransfer.items;
        if (!items || !selectedFolder || !ydocRef.current) return;

        logEvent('Обнаружены перетаскиваемые объекты начат анализ структуры');
        const filesToAdd = [];

        for (let i = 0; i < items.length; i++) {
          const item = items[i];
          if (item.kind === 'file') {
            const entry = item.webkitGetAsEntry();
            if (entry) {
              const loadedFiles = await traverseFileEntry(entry);
              filesToAdd.push(...loadedFiles);
            }
          }
        }

        if (filesToAdd.length > 0) {
          const sharedFolders = ydocRef.current.getMap('folders');
          const currentFolderObj = sharedFolders.get(selectedFolder);

          if (currentFolderObj) {
            const updatedFiles = [...(currentFolderObj.files || []), ...filesToAdd];
            sharedFolders.set(selectedFolder, {
              ...currentFolderObj,
              files: updatedFiles
            });

            logEvent(`Успешно загружено реальных файлов в количестве ${filesToAdd.length}`);
            triggerAlert('Все перенесенные файлы успешно записаны в хранилище');
          }
        }
      };

      // Классический выбор файлов через кнопку компьютера
      const handleFileSelect = (e) => {
        const selectedFiles = Array.from(e.target.files);
        if (selectedFiles.length === 0 || !selectedFolder || !ydocRef.current) return;

        logEvent('Запущена пакетная загрузка файлов через проводник');
        
        selectedFiles.forEach(file => {
          const reader = new FileReader();
          reader.onload = (event) => {
            const newFileObj = {
              id: 'file_' + Date.now() + '_' + Math.random().toString(36).substr(2, 5),
              name: file.name,
              size: (file.size / 1024).toFixed(1) + ' килобайт',
              date: '23 мая 2026',
              category: 'Загруженный документ',
              path: '',
              content: event.target.result
            };

            const sharedFolders = ydocRef.current.getMap('folders');
            const currentFolderObj = sharedFolders.get(selectedFolder);
            if (currentFolderObj) {
              const updatedFiles = [...(currentFolderObj.files || []), newFileObj];
              sharedFolders.set(selectedFolder, {
                ...currentFolderObj,
                files: updatedFiles
              });
              logEvent(`Записан файл ${file.name}`);
            }
          };

          if (file.type.startsWith('text/') || file.name.endsWith('.txt') || file.name.endsWith('.md') || file.name.endsWith('.json') || file.name.endsWith('.js') || file.name.endsWith('.css')) {
            reader.readAsText(file);
          } else {
            reader.readAsDataURL(file);
          }
        });

        triggerAlert('Выбранные файлы успешно загружены в хранилище');
      };

      // Совместное изменение текста в реальном времени
      const handleEditTextChange = (e) => {
        const val = e.target.value;
        setCollaborativeText(val);

        if (ytextObserverRef.current) {
          const { ytext } = ytextObserverRef.current;
          // Обновляем общий документ Yjs без конфликтов
          ydocRef.current.transact(() => {
            ytext.delete(0, ytext.length);
            ytext.insert(0, val);
          });
        }
      };

      // Сохранение отредактированного текста в структуру файлов папки
      const saveCollaborativeFile = () => {
        if (!activeEditingFile || !selectedFolder || !ydocRef.current) return;

        const sharedFolders = ydocRef.current.getMap('folders');
        const currentFolderObj = sharedFolders.get(selectedFolder);

        if (currentFolderObj) {
          const updatedFiles = currentFolderObj.files.map(f => {
            if (f.id === activeEditingFile.id) {
              return { ...f, content: collaborativeText };
            }
            return f;
          });

          sharedFolders.set(selectedFolder, {
            ...currentFolderObj,
            files: updatedFiles
          });

          logEvent(`Сохранены изменения в файле ${activeEditingFile.name}`);
          triggerAlert('Файл успешно сохранен на всех устройствах');
        }
        setActiveEditingFile(null);
      };

      // Скачивание файла обратно на компьютер
      const downloadFileToComputer = (file) => {
        const element = document.createElement('a');
        let fileBlob;
        
        if (file.content && file.content.startsWith('data:')) {
          // Восстановление бинарного файла из base64
          const splitData = file.content.split(',');
          const byteString = atob(splitData[1]);
          const mimeString = splitData[0].split(':')[1].split(';')[0];
          const ab = new ArrayBuffer(byteString.length);
          const ia = new Uint8Array(ab);
          for (let i = 0; i < byteString.length; i++) {
            ia[i] = byteString.charCodeAt(i);
          }
          fileBlob = new Blob([ab], { type: mimeString });
        } else {
          fileBlob = new Blob([file.content || ''], { type: 'text/plain;charset=utf-8' });
        }

        element.href = URL.createObjectURL(fileBlob);
        element.download = file.name;
        document.body.appendChild(element);
        element.click();
        document.body.removeChild(element);
        logEvent(`Скачан файл ${file.name}`);
      };

      // Импорт данных из реальной консоли Google Search Console
      const handleFetchGscData = async (e) => {
        if (e) e.preventDefault();
        if (!gscSiteUrl.trim() || !gscToken.trim()) {
          triggerAlert('Укажите адрес сайта и рабочий токен доступа');
          return;
        }
        
        setGscLoading(true);
        logEvent('Инициирован запрос к программному интерфейсу Гугл Консоли');

        try {
          const cleanSiteUrl = gscSiteUrl.trim();
          const encodedSite = encodeURIComponent(cleanSiteUrl);
          const queryUrl = `https://www.googleapis.com/webmasters/v3/sites/${encodedSite}/searchAnalytics/query`;

          const responseQueries = await fetch(queryUrl, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${gscToken.trim()}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              startDate: '2026-05-01',
              endDate: '2026-05-23',
              dimensions: ['query'],
              rowLimit: 10
            })
          });

          if (!responseQueries.ok) {
            throw new Error('Ошибка получения списка поисковых фраз с сервера');
          }

          const dataQueries = await responseQueries.json();

          const responseDates = await fetch(queryUrl, {
            method: 'POST',
            headers: {
              'Authorization': `Bearer ${gscToken.trim()}`,
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({
              startDate: '2026-05-01',
              endDate: '2026-05-23',
              dimensions: ['date']
            })
          });

          if (!responseDates.ok) {
            throw new Error('Ошибка получения данных аналитического графика');
          }

          const dataDates = await responseDates.json();

          const queryRows = dataQueries.rows || [];
          const dateRows = dataDates.rows || [];

          let totalClicks = 0;
          let totalImpressions = 0;
          let sumCtr = 0;
          let sumPosition = 0;

          dateRows.forEach(row => {
            totalClicks += row.clicks || 0;
            totalImpressions += row.impressions || 0;
            sumCtr += row.ctr || 0;
            sumPosition += row.position || 0;
          });

          const avgCtrValue = dateRows.length ? Math.round((sumCtr / dateRows.length) * 100) : 0;
          const avgPosValue = dateRows.length ? Math.round(sumPosition / dateRows.length) : 0;

            clicks: row.clicks || 0,
            ctr: Math.round((row.ctr || 0) * 100),

          }));

            date: row.keys?.[0] || '',
            clicks: row.clicks || 0
          })).sort((a, b) => a.date.localeCompare(b.date));

            totalClicks,
            totalImpressions,
            avgCtr: avgCtrValue,
            avgPosition: avgPosValue,
            queries: processedQueries,
            chartData: processedChart
          });

                          <input 
                            type="text"
                            className="w-full glowing-neon-input text-xs p-2.5 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                            placeholder="sc domain domain com"
                            value={gscSiteUrl}
                            onChange={(e) => setGscSiteUrl(e.target.value)}
                            required
                          />
                        </div>
                        <div>
                          <label className="block text-[8px] font-mono uppercase tracking-wider text-stone-400 mb-1.5">Токен доступа OAuth2</label>
                          <input 
                            type="password"
                            className="w-full glowing-neon-input text-xs p-2.5 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                            placeholder="Вставьте токен доступа"
                            value={gscToken}
                            onChange={(e) => setGscToken(e.target.value)}
                            required
                          />
                        </div>
                        <div className="flex items-end">
                          <button 
                            type="submit" 
                            disabled={gscLoading}
                            className="w-full bg-stone-100 hover:bg-white text-black rounded text-[10px] font-mono uppercase font-bold tracking-widest transition-colors flex items-center justify-center gap-2 py-3 disabled:opacity-50"
                          >
                            <span>Импортировать данные</span>
                          </button>
                        </div>
                      </form>
                    </div>

                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                      {[
                        { label: 'Переходы из поиска', value: gscMetrics.totalClicks ? gscMetrics.totalClicks.toLocaleString() : '0' },
                        { label: 'Общие показы', value: gscMetrics.totalImpressions ? gscMetrics.totalImpressions.toLocaleString() : '0' },
                        { label: 'Показатель CTR', value: gscMetrics.avgCtr ? `${gscMetrics.avgCtr} процентов` : '0 процентов' },
                        { label: 'Средняя позиция', value: gscMetrics.avgPosition ? gscMetrics.avgPosition : '0' }
                      ].map((stat, idx) => (
                        <div key={idx} className="glowing-neon-container p-4">
                          <span className="text-[9px] font-mono text-stone-500 uppercase tracking-widest block">{stat.label}</span>
                          <span className="text-lg sm:text-xl font-serif font-bold text-stone-100 block mt-1">{stat.value}</span>
                        </div>
                      ))}
                    </div>

                    <div className="glowing-neon-container p-4">
                      <div className="border-b border-stone-900 pb-3 mb-3">
                        <span className="text-[9px] font-mono uppercase tracking-widest text-stone-400">График кликов в поисковой выдаче за неделю</span>
                      </div>

                      <div className="w-full h-44 relative">
                        {gscMetrics.chartData && gscMetrics.chartData.length > 0 ? (
                          <svg className="w-full h-full" viewBox="0 0 700 250" preserveAspectRatio="none">
                            <defs>
                              <linearGradient id="chartGradient" x1="0" y1="0" x2="0" y2="1">
                                <stop offset="0%" stopColor="#d8b4fe" stopOpacity="0.25" />
                                <stop offset="100%" stopColor="#d8b4fe" stopOpacity="0.00" />
                              </linearGradient>
                            </defs>
                            <line x1="0" y1="50" x2="700" y2="50" stroke="#111" strokeWidth="1" />
                            <line x1="0" y1="150" x2="700" y2="150" stroke="#111" strokeWidth="1" />
                            <path d={buildSvgAreaPath()} fill="url(#chartGradient)" />
                            <path d={buildSvgPath()} fill="none" stroke="#d8b4fe" strokeWidth="2.5" />
                          </svg>
                        ) : (
                          <div className="absolute inset-0 flex items-center justify-center border border-dashed border-stone-900 rounded">
                            <span className="font-mono text-[9px] text-stone-600 uppercase tracking-widest text-center px-4">
                              Укажите параметры доступа выше для построения графика
                            </span>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>
                )}

                {/* МОДУЛЬ СЕЙФА (ХРАНЕНИЕ ПАРОЛЕЙ И КЛЮЧЕЙ С КНОПКОЙ СКРЫТИЯ) */}
                {activeTab === 'safe' && (
                  <div className="space-y-5">
                    <div className="glowing-neon-container p-4">
                      <span className="text-[9px] font-mono uppercase tracking-widest text-stone-500 mb-3 block">Записать новые доступы</span>
                      <form onSubmit={handleAddCredential} className="grid grid-cols-1 sm:grid-cols-4 gap-3">
                        <input 
                          type="text"
                          className="glowing-neon-input text-xs p-3 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                          placeholder="Название доступа"
                          value={newCred.title}
                          onChange={(e) => setNewCred({...newCred, title: e.target.value})}
                          required
                        />
                        <input 
                          type="text"
                          className="glowing-neon-input text-xs p-3 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                          placeholder="Логин"
                          value={newCred.login}
                          onChange={(e) => setNewCred({...newCred, login: e.target.value})}
                        />
                        <input 
                          type="password"
                          className="glowing-neon-input text-xs p-3 rounded font-mono text-stone-200 placeholder-stone-800 outline-none"
                          placeholder="Секретный пароль"
                          value={newCred.secret}
                          onChange={(e) => setNewCred({...newCred, secret: e.target.value})}
                          required
                        />
                        <button type="submit" className="bg-stone-100 hover:bg-white text-black rounded text-xs font-mono uppercase font-bold tracking-widest transition-colors py-3">
                          <span>Запечатать</span>
                        </button>
                      </form>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                      {credentials.length === 0 ? (
                        <div className="md:col-span-2 text-center py-12 border border-dashed border-stone-900 rounded-lg">
                          <p className="font-mono text-[9px] text-stone-600 uppercase tracking-widest">Сейф пуст</p>
                        </div>
                      ) : (
                        credentials.map(c => (
                          <div key={c.id} className="glowing-neon-container p-4 relative overflow-hidden flex flex-col justify-between">
                            <div className="space-y-3">
                              <div className="flex items-start justify-between">
                                <div>
                                  <span className="text-[8px] font-mono uppercase text-purple-400 tracking-widest">{c.category || 'Общие'}</span>
                                  <h4 className="text-xs font-mono font-bold text-stone-200 mt-0.5">{c.title}</h4>
                                </div>
                                <button 
                                  onClick={() => deleteCredential(c.id, c.title)}
                                  className="text-stone-500 hover:text-purple-400 p-1"
                                >
                                  <i data-lucide="trash-2" className="w-4 h-4"></i>
                                </button>
                              </div>

                              <div className="space-y-2 bg-black border border-stone-900 rounded p-3 font-mono text-[10px]">
                                <div className="flex justify-between items-center py-1">
                                  <div>
                                    <span className="text-[8px] text-stone-600 uppercase block">Логин</span>
                                    <span className="text-stone-300 break-all">{c.login || 'Идентификатор отсутствует'}</span>
                                  </div>
                                  {c.login && (
                                    <button 
                                      onClick={() => copyToClipboard(c.login, `${c.id}-login`)} 
                                      className="text-stone-500 hover:text-stone-300 p-1"
                                    >
                                      {copiedId === `${c.id}-login` ? '✅' : <i data-lucide="copy" className="w-3.5 h-3.5"></i>}
                                    </button>
                                  )}
                                </div>

                                <div className="flex justify-between items-center py-1 border-t border-stone-950">
                                  <div>
                                    <span className="text-[8px] text-stone-600 uppercase block">Шифр</span>
                                    <span className="text-stone-200 tracking-wider font-bold">
                                      {showSecretId[c.id] ? c.secret : '••••••••••••••••'}
                                    </span>
                                  </div>
                                  <div className="flex items-center gap-1.5">
                                    <button 
                                      onClick={() => toggleSecret(c.id)} 
                                      className="text-stone-500 hover:text-stone-300 p-1"
                                    >
                                      {showSecretId[c.id] ? <i data-lucide="eye-off" className="w-3.5 h-3.5"></i> : <i data-lucide="eye" className="w-3.5 h-3.5"></i>}
                                    </button>
                                    <button 
                                      onClick={() => copyToClipboard(c.secret, `${c.id}-secret`)} 
                                      className="text-stone-500 hover:text-stone-300 p-1"
                                    >
                                      {copiedId === `${c.id}-secret` ? '✅' : <i data-lucide="copy" className="w-3.5 h-3.5"></i>}
                                    </button>
                                  </div>
                                </div>
                              </div>
                            </div>
                          </div>
                        ))
                      )}
                    </div>
                  </div>
                )}

              </main>
            </div>
          )}

          {/* Сервисный нижний футер */}
          <footer className="bg-[#020202] border-t border-stone-900 py-3 px-6 text-center text-[8px] font-mono text-stone-600 uppercase tracking-widest z-20">
            <span>2026 Система PROMT Support Безопасная сессия</span>
          </footer>

        </div>
      );
    }

    // Инициализация Lucide иконок после каждого рендера
    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    
    function MainApp() {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });
      return <App />;
    }

    root.render(<MainApp />);
  </script>
</body>
</html>
